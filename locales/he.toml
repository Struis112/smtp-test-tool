save_to_keychain = "שמור סיסמה במחזיק המפתחות"
save_to_keychain_tooltip = "שומר את הסיסמה במחזיק המפתחות של מערכת ההפעלה (Windows Credential Manager / macOS Keychain / Linux Secret Service). לעולם לא נכתב לקובץ התצורה."
forget_keychain = "שכח רשומת מחזיק מפתחות"
forget_keychain_tooltip = "מוחק את רשומת smtp-test-tool של משתמש זה ממחזיק המפתחות של מערכת ההפעלה. שדה הסיסמה למעלה מנוקה גם כן."
loaded_from_keychain = "(נטען ממחזיק המפתחות)"

[ui.proto]
test_smtp = "בדוק SMTP"
test_imap = "בדוק IMAP"
test_pop3 = "בדוק POP3"
host = "מארח:"
