# smtp-test-tool locale: עברית (he)
# status: machine-translated, native review welcome.
# Note: egui 0.34 has partial bidi support; Hebrew text shape is
# correct but layout may not perfectly match RTL conventions yet.

[app]
name = "SMTP Test Tool"

[locale]
