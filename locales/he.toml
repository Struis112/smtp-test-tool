[ui.send]
toggle = "שלח בפועל דואר בדיקה (אחרת בדוק AUTH בלבד)"
mail_from = "MAIL FROM (מעטפה):"
from_header = "From: (כותרת):"
to = "אל (מופרד בפסיקים):"
cc = "Cc (מופרד בפסיקים):"
bcc = "Bcc (מופרד בפסיקים):"
reply_to = "השב אל:"
subject = "נושא:"
body = "תוכן:"

[ui.tls]
auth_mech = "מנגנון SMTP AUTH:"
insecure = "בטל אימות תעודה (לא בטוח - לבדיקה בלבד)"
