provider_preset_tooltip = "מחיל אחת מערכות הספקים האצורות על שדות המארח / היציאה / האבטחה למטה."
config_path_none = "אין קובץ תצורה"

[ui.tab]
servers = "שרתים"
send_mail = "שלח דואר"
tls_auth = "TLS / Auth"
advanced = "מתקדם"
diagnose = "נתח החזרה"

