fix  = "அனுப்புநர் அங்கீகரிக்கப்படவில்லை, அல்லது பெறுநர் வெளிப்புறமாக உள்ளார் மற்றும் relay முடக்கப்பட்டுள்ளது, அல்லது transport rule செய்தியை தடுக்கிறது."

