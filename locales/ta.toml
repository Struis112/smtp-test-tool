[diagnostics.imap.AUTHENTICATIONFAILED]
hint = "IMAP உள்நுழைவு நிராகரிக்கப்பட்டது - தவறான கடவுச்சொல், app-password இல்லாமல் MFA, அல்லது Basic Auth முடக்கப்பட்டுள்ளது."

[diagnostics.imap."LOGIN_failed"]
hint = "IMAP உள்நுழைவு சேவையகத்தால் நிராகரிக்கப்பட்டது."

[diagnostics.imap.ALERT]
hint = "சேவையகம் ALERT பதிலை திருப்பியது - படிக்கவும்; நிர்வாகி-வரையறுக்கப்பட்ட செய்தி."

[diagnostics.imap.UNAVAILABLE]
hint = "மெயில்பாக்ஸ்/சேவையகம் தற்காலிகமாக கிடைக்கவில்லை."

[diagnostics.imap.PRIVACYREQUIRED]
hint = "சேவையகத்திற்கு LOGIN-க்கு முன் TLS தேவை - STARTTLS அல்லது மறைமுக SSL-ஐ பயன்படுத்தவும்."

[diagnostics.imap.CLIENTBUG]
hint = "சேவையகம் தவறு என்று கருதும் ஒன்றை கிளையன்ட் செய்தது; பொதுவாக STARTTLS காணவில்லை அல்லது தவறான நிலை."

[diagnostics.imap.LOGINDISABLED]
hint = "இந்த சேவையகத்தில் Plain LOGIN முடக்கப்பட்டுள்ளது - STARTTLS/SSL அல்லது XOAUTH2-ஐ பயன்படுத்தவும்."

[diagnostics.pop.authentication_failed]
hint = "POP3 உள்நுழைவு நிராகரிக்கப்பட்டது - தவறான சான்றுகள் அல்லது இந்த மெயில்பாக்ஸுக்கு POP முடக்கப்பட்டுள்ளது."

[diagnostics.pop.logon_failure]
hint = "POP3 உள்நுழைவு நிராகரிக்கப்பட்டது."

[diagnostics.pop.not_implemented]
hint = "வழங்கப்பட்ட கட்டளையை சேவையகம் ஆதரிக்கவில்லை."

[diagnostics.pop.disabled]
hint = "இந்த கணக்கு / tenant-க்கு POP3 அணுகல் முடக்கப்பட்டுள்ளது."

