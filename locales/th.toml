[diagnostics.smtp.esc.5_7_0]
what = "จำเป็นต้องมีการตรวจสอบสิทธิ์ หรือกลไก AUTH ที่เลือกไม่ได้รับอนุญาต"
fix  = "เปิดใช้งาน SMTP AUTH สำหรับเมลบ็อกซ์; ตรวจสอบว่า LOGIN / PLAIN / XOAUTH2 ได้รับอนุญาต"

[diagnostics.smtp.esc.5_7_1]
what = "Relay ถูกปฏิเสธการเข้าถึง - เซิร์ฟเวอร์ปฏิเสธที่จะส่งต่อข้อความนี้"
fix  = "ผู้ส่งไม่ได้รับการตรวจสอบสิทธิ์, ผู้รับเป็นบุคคลภายนอกและ relay ถูกปิดใช้งาน, หรือ transport rule กำลังบล็อกข้อความ"

[diagnostics.smtp.esc.5_7_3]
what = "การตรวจสอบสิทธิ์ไม่สำเร็จ"
fix  = "รหัสผ่านผิด, MFA โดยไม่มี app-password, หรือ Basic/Legacy auth ถูกปิดใช้งานบน tenant (O365: 'SMTP AUTH disabled')"

[diagnostics.smtp.esc.5_7_8]
what = "ข้อมูลรับรองการตรวจสอบสิทธิ์ไม่ถูกต้อง"
fix  = "ชื่อผู้ใช้/รหัสผ่านถูกปฏิเสธโดยชั้น SASL"

[diagnostics.smtp.esc.5_7_57]
what = "ไคลเอ็นต์ไม่ได้รับการตรวจสอบสิทธิ์เพื่อส่งเมลแบบไม่ระบุตัวตนระหว่าง MAIL FROM"
fix  = "บังคับใช้ STARTTLS + AUTH ก่อน MAIL FROM ใน O365 นี่เป็นข้อผิดพลาดทั่วไปเมื่อไคลเอ็นต์เชื่อมต่อโดยไม่มี AUTH"

[diagnostics.smtp.esc.5_7_60]
what = "SendAsDenied - ผู้ใช้ที่ตรวจสอบสิทธิ์แล้วไม่ได้รับอนุญาตให้ส่งในชื่อที่อยู่ From นี้"
fix  = "ให้สิทธิ์เมลบ็อกซ์ 'Send As' (หรือ 'Send on Behalf') แก่บัญชีที่ตรวจสอบสิทธิ์แล้ว หรือเปลี่ยนส่วนหัว From ให้ตรงกับการลงชื่อเข้าใช้"

[diagnostics.smtp.esc.5_7_64]
what = "TenantAttribution; Relay Access Denied"
fix  = "การส่ง SMTP ที่ตรวจสอบสิทธิ์ต้องการเมลบ็อกซ์ที่ได้รับอนุญาตใน O365"

[diagnostics.smtp.esc.5_7_124]
what = "ผู้ใช้ไม่ได้รับอนุญาตให้ส่งเมล"
fix  = "เมลบ็อกซ์ปิดใช้งาน, ถูกบล็อกโดย Conditional Access, หรือใบอนุญาตหายไป"

[diagnostics.smtp.esc.5_7_135]
what = "การตรวจสอบสิทธิ์ไม่สำเร็จ, ข้อมูลรับรองผู้ใช้หมดอายุ"
fix  = "รีเซ็ตรหัสผ่าน / รีเฟรชโทเค็น OAuth"

[diagnostics.smtp.esc.5_7_139]
