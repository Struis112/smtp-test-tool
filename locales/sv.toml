clear = "Rensa"
hints_heading = "Tips"
no_hints_yet = "(inga tips ännu - klistra in en studs ovan och klicka Analysera)"

[ui.log]
heading = "Logg"

[diagnostics.scaffold]
esc_prefix = "ESC {code}: {what}"
action_prefix = "  -> Åtgärd: {fix}"
hint_prefix = "  -> {hint}"

[diagnostics.smtp.esc.5_7_0]
what = "Autentisering krävs eller vald AUTH-mekanism inte tillåten."
fix  = "Aktivera SMTP AUTH för brevlådan; kontrollera att LOGIN / PLAIN / XOAUTH2 är tillåten."

[diagnostics.smtp.esc.5_7_1]
what = "Relay-åtkomst nekad - servern vägrar vidarebefordra detta meddelande."
fix  = "Antingen är avsändaren inte autentiserad, mottagaren är extern och relay är avaktiverat, eller en transport rule blockerar meddelandet."

[diagnostics.smtp.esc.5_7_3]
what = "Autentisering misslyckades."
fix  = "Fel lösenord, MFA aktiverat utan app-password, eller Basic/Legacy auth avaktiverat på tenanten (O365: 'SMTP AUTH disabled')."

[diagnostics.smtp.esc.5_7_8]
what = "Autentiseringsuppgifter ogiltiga."
fix  = "Användarnamn/lösenord avvisat av SASL-lagret."

[diagnostics.smtp.esc.5_7_57]
what = "Klient inte autentiserad för att skicka anonym post under MAIL FROM."
fix  = "Tvinga STARTTLS + AUTH före MAIL FROM.  I O365 är det det typiska felet när klienten ansluter utan AUTH."

[diagnostics.smtp.esc.5_7_60]
what = "SendAsDenied - den autentiserade användaren får inte skicka SOM denna From-adress."
fix  = "Ge brevlådan 'Send As' (eller 'Send on Behalf') rättigheter för det autentiserade kontot, eller ändra From-headern så den matchar inloggningen."

[diagnostics.smtp.esc.5_7_64]
what = "TenantAttribution; Relay Access Denied."
fix  = "Autentiserad SMTP-inlämning kräver en licensierad brevlåda i O365."

[diagnostics.smtp.esc.5_7_124]
what = "Användaren är inte behörig att skicka post."
fix  = "Inaktiverad brevlåda, blockerad av Conditional Access, eller saknad licens."

[diagnostics.smtp.esc.5_7_135]
what = "Autentisering misslyckades, användaruppgifterna har gått ut."
fix  = "Återställ lösenordet / uppdatera OAuth-token."

[diagnostics.smtp.esc.5_7_139]
what = "Autentisering misslyckades; begäran uppfyllde inte kriterierna."
fix  = "En Conditional Access-policy nekade inloggningen (plats, enhet, MFA)."

[diagnostics.smtp.esc.5_7_500]
what = "Åtkomst nekad, avsändande domän avaktiverad."
fix  = "Avsändarens domän är blockerad för utgående post på denna tenant."

[diagnostics.smtp.esc.5_7_501]
what = "Åtkomst nekad, bannlyst avsändare."
fix  = "Avsändarens adress finns på en tenant-blocklist."

[diagnostics.smtp.esc.5_7_508]
what = "Åtkomst nekad, hastighets- eller trafiktröskel överskriden."
fix  = "Throttled; vänta och försök igen, eller be admin höja gränsen."

[diagnostics.smtp.esc.5_7_511]
what = "Åtkomst nekad, bannlyst avsändare."
fix  = "Avsändaren markerad som spam-källa."

[diagnostics.smtp.esc.5_7_606]
what = "Åtkomst nekad, bannlyst sändande IP."
fix  = "Sändande IP finns på en Microsoft-blocklist."

[diagnostics.smtp.esc.5_7_708]
what = "Tjänst nekad.  Käll-IP har dåligt rykte."
fix  = "Skicka från en annan IP eller begär delisting."

[diagnostics.smtp.esc.5_7_750]
what = "Klient blockerad för att skicka från oregistrerade domäner."
fix  = "Verifiera avsändarens domän på tenanten eller använd en accepterad domän."

[diagnostics.smtp.esc.5_1_0]
what = "Avsändaradress avvisad."
fix  = "From/MAIL FROM ej accepterad; vanligen format eller domänpolicy."

[diagnostics.smtp.esc.5_1_1]
what = "Fel destinationsbrevlåda - mottagaren finns inte."
fix  = "Kontrollera mottagaradressen."

[diagnostics.smtp.esc.5_1_7]
what = "Ogiltig avsändaradress (felformaterad)."
fix  = "Rätta MAIL FROM-syntaxen."

[diagnostics.smtp.esc.5_1_8]
what = "Avsändardomän inte tillåten."
fix  = "Domän ej accepterad av servern."

[diagnostics.smtp.esc.5_1_10]
what = "Mottagaradress avvisad - användare okänd."
fix  = "Felskrivning eller obefintlig mottagare."

[diagnostics.smtp.esc.5_4_1]
what = "Mottagaradress avvisad: åtkomst nekad."
fix  = "Mottagarens brevlåda avvisar meddelanden från denna avsändare / domän."

[diagnostics.smtp.esc.5_2_1]
what = "Brevlåda avaktiverad, accepterar inte meddelanden."
fix  = "Mottagarens brevlåda avstängd."

[diagnostics.smtp.esc.5_2_2]
what = "Brevlåda full."
fix  = "Mottagarens kvot överskriden."

[diagnostics.smtp.esc.5_3_4]
what = "Meddelandet för stort för systemet."
fix  = "Minska meddelandets storlek."

[diagnostics.smtp.esc.4_7_0]
what = "Tillfälligt autentiseringsfel / throttling."
fix  = "Försök igen senare; kan också vara tarpit för upprepade felaktiga inloggningar."

[diagnostics.smtp.esc.4_4_2]
what = "Anslutning bruten."
fix  = "Nätverksfel eller serverrestart; försök igen."

[diagnostics.smtp.esc.4_3_2]
what = "Systemet accepterar inte nätverksmeddelanden."
fix  = "Serverunderhåll."

[diagnostics.imap.AUTHENTICATIONFAILED]
hint = "IMAP-inloggning avvisad - fel lösenord, MFA utan app-password, eller Basic Auth avaktiverat."

[diagnostics.imap."LOGIN_failed"]
hint = "IMAP-inloggning avvisad av servern."

[diagnostics.imap.ALERT]
hint = "Servern returnerade ALERT-svar - läs det; meddelande definierat av administratör."

[diagnostics.imap.UNAVAILABLE]
hint = "Brevlåda/server tillfälligt otillgänglig."

[diagnostics.imap.PRIVACYREQUIRED]
hint = "Servern kräver TLS före LOGIN - använd STARTTLS eller implicit SSL."

[diagnostics.imap.CLIENTBUG]
hint = "Klienten gjorde något som servern betraktar som fel; vanligen saknad STARTTLS eller fel tillstånd."

[diagnostics.imap.LOGINDISABLED]
hint = "Plain LOGIN är avaktiverat på denna server - använd STARTTLS/SSL eller XOAUTH2."

[diagnostics.pop.authentication_failed]
hint = "POP3-inloggning avvisad - fel uppgifter eller POP avaktiverat för denna brevlåda."

[diagnostics.pop.logon_failure]
hint = "POP3-inloggning avvisad."

[diagnostics.pop.not_implemented]
hint = "Servern stöder inte det utfärdade kommandot."

[diagnostics.pop.disabled]
hint = "POP3-åtkomst är avaktiverad för detta konto / tenant."

[diagnostics.bounce.gmail_send_as_en]
needle = "Send mail as"
hint = "Gmails uppströms-inloggning 'Send mail as' misslyckades.  Inställningar > Visa alla inställningar > Konton och import > Skicka som > Redigera info > ange SMTP-lösenordet igen (eller ett app-password om källkontot har 2FA)."

[diagnostics.bounce.gmail_send_as_nl]
needle = "Mail sturen als"
hint = "Gmails uppströms-inloggning 'Mail sturen als' (Send mail as) misslyckades.  Inställningar > Visa alla inställningar > Konton och import > Skicka som > Redigera info > ange SMTP-lösenordet igen (eller ett app-password om källkontot har 2FA)."

[cli.prompt]
username = "Användarnamn / e-post: "
password = "Lösenord: "
