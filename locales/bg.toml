[diagnostics.smtp.esc.5_7_1]
what = "Достъп до relay отказан - сървърът отказва да препрати това съобщение."
fix  = "Или подателят не е удостоверен, получателят е външен и relay е изключен, или transport rule блокира съобщението."

[diagnostics.smtp.esc.5_7_3]
what = "Удостоверяването неуспешно."
