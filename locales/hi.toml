[diagnostics.smtp.esc.5_7_0]
what = "प्रमाणीकरण आवश्यक है, या चयनित AUTH तंत्र की अनुमति नहीं है।"
fix  = "मेलबॉक्स के लिए SMTP AUTH सक्षम करें; सत्यापित करें कि LOGIN / PLAIN / XOAUTH2 की अनुमति है।"

[diagnostics.smtp.esc.5_7_1]
what = "Relay पहुँच अस्वीकृत - सर्वर इस संदेश को अग्रेषित करने से इनकार करता है।"
fix  = "या तो प्रेषक प्रमाणित नहीं है, या प्राप्तकर्ता बाहरी है और relay अक्षम है, या एक transport rule संदेश को अवरुद्ध कर रहा है।"

[diagnostics.smtp.esc.5_7_3]
what = "प्रमाणीकरण असफल।"
fix  = "गलत पासवर्ड, बिना app-password के MFA, या tenant पर Basic/Legacy auth अक्षम है (O365: 'SMTP AUTH disabled')।"

[diagnostics.smtp.esc.5_7_8]
what = "प्रमाणीकरण क्रेडेंशियल मान्य नहीं हैं।"
fix  = "उपयोगकर्ता नाम/पासवर्ड SASL परत द्वारा अस्वीकृत किए गए।"

[diagnostics.smtp.esc.5_7_57]
what = "क्लाइंट MAIL FROM के दौरान अनाम मेल भेजने के लिए प्रमाणित नहीं था।"
fix  = "MAIL FROM से पहले STARTTLS + AUTH लागू करें। O365 में, यह विशिष्ट त्रुटि है जब क्लाइंट AUTH के बिना कनेक्ट होता है।"

[diagnostics.smtp.esc.5_7_60]
what = "SendAsDenied - प्रमाणित उपयोगकर्ता को इस From पते के रूप में भेजने की अनुमति नहीं है।"
fix  = "मेलबॉक्स को प्रमाणित खाते के लिए 'Send As' (या 'Send on Behalf') अधिकार दें, या लॉगिन से मेल खाने के लिए From शीर्षलेख बदलें।"

[diagnostics.smtp.esc.5_7_64]
what = "TenantAttribution; Relay Access Denied।"
fix  = "प्रमाणित SMTP प्रस्तुति के लिए O365 में लाइसेंस प्राप्त मेलबॉक्स आवश्यक है।"

[diagnostics.smtp.esc.5_7_124]
what = "उपयोगकर्ता को मेल भेजने का अधिकार नहीं है।"
fix  = "अक्षम मेलबॉक्स, Conditional Access द्वारा अवरुद्ध, या लाइसेंस गायब है।"

[diagnostics.smtp.esc.5_7_135]
what = "प्रमाणीकरण असफल, उपयोगकर्ता क्रेडेंशियल समाप्त हो गए।"
fix  = "पासवर्ड रीसेट करें / OAuth टोकन ताज़ा करें।"

[diagnostics.smtp.esc.5_7_139]
