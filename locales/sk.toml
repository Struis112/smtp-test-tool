[ui.diagnose]
intro = "Vložte nižšie telo správy o nedoručení pre extrakciu IT-akčných pokynov.  Rozpoznáva SMTP enhanced status kódy (5.7.139, 5.7.60), frázy Microsoft 365 (\"basic authentication is disabled\") a webmailové odrazy ako \"Send mail as / Mail sturen als\" v Gmaile.  Nič sa neposiela po sieti a text sa neukladá na disk."
input_placeholder = "Vložte sem telo odrazu..."
analyse = "Analyzovať"
clear = "Vyčistiť"
hints_heading = "Pokyny"
no_hints_yet = "(zatiaľ žiadne pokyny - vložte odraz vyššie a kliknite na Analyzovať)"

[ui.log]
heading = "Log"

[diagnostics.scaffold]
esc_prefix = "ESC {code}: {what}"
action_prefix = "  -> Akcia: {fix}"
hint_prefix = "  -> {hint}"

[diagnostics.smtp.esc.5_7_0]
what = "Vyžadované overenie alebo zvolený AUTH mechanizmus nie je povolený."
fix  = "Povoľte SMTP AUTH pre schránku; overte, či LOGIN / PLAIN / XOAUTH2 je povolený."

[diagnostics.smtp.esc.5_7_1]
what = "Relay prístup zamietnutý - server odmieta preposlať túto správu."
fix  = "Buď odosielateľ nie je overený, príjemca je externý a relay je vypnutý, alebo transport rule blokuje správu."

[diagnostics.smtp.esc.5_7_3]
what = "Overenie neúspešné."
fix  = "Zlé heslo, MFA zapnutá bez app-password, alebo Basic/Legacy auth zakázané v tenante (O365: 'SMTP AUTH disabled')."

[diagnostics.smtp.esc.5_7_8]
what = "Overovacie údaje neplatné."
fix  = "Používateľské meno/heslo odmietnuté vrstvou SASL."

[diagnostics.smtp.esc.5_7_57]
what = "Klient nebol overený na odoslanie anonymnej pošty počas MAIL FROM."
fix  = "Vynúťte STARTTLS + AUTH pred MAIL FROM.  V O365 je to typická chyba, keď sa klient pripojí bez AUTH."

[diagnostics.smtp.esc.5_7_60]
what = "SendAsDenied - overený používateľ nemôže odosielať AKO táto From adresa."
fix  = "Udeľte schránke práva 'Send As' (alebo 'Send on Behalf') pre overený účet, alebo zmeňte From hlavičku, aby zodpovedala loginu."

[diagnostics.smtp.esc.5_7_64]
what = "TenantAttribution; Relay Access Denied."
fix  = "Overené SMTP odosielanie vyžaduje licencovanú schránku v O365."

[diagnostics.smtp.esc.5_7_124]
what = "Používateľ nie je oprávnený odosielať poštu."
fix  = "Zakázaná schránka, blokovaná Conditional Access, alebo chýba licencia."

[diagnostics.smtp.esc.5_7_135]
what = "Overenie neúspešné, používateľské údaje vypršali."
fix  = "Resetujte heslo / obnovte OAuth token."

[diagnostics.smtp.esc.5_7_139]
what = "Overenie neúspešné; požiadavka nesplnila kritériá."
fix  = "Politika Conditional Access odmietla login (lokalita, zariadenie, MFA)."

[diagnostics.smtp.esc.5_7_500]
what = "Prístup zamietnutý, odosielajúca doména zakázaná."
fix  = "Doména odosielateľa je blokovaná pre odchodzu poštu v tomto tenante."

[diagnostics.smtp.esc.5_7_501]
what = "Prístup zamietnutý, zakázaný odosielateľ."
fix  = "Adresa odosielateľa je na blocklistu tenantu."

[diagnostics.smtp.esc.5_7_508]
what = "Prístup zamietnutý, prekročený prah rýchlosti alebo prevádzky."
fix  = "Throttlovaný; počkajte a skúste znova, alebo požiadajte administrátora o zvýšenie limitu."

[diagnostics.smtp.esc.5_7_511]
what = "Prístup zamietnutý, zakázaný odosielateľ."
fix  = "Odosielateľ označený ako zdroj spamu."

[diagnostics.smtp.esc.5_7_606]
what = "Prístup zamietnutý, zakázaná odosielajúca IP."
fix  = "Odosielajúca IP je na blocklistu Microsoftu."

[diagnostics.smtp.esc.5_7_708]
what = "Služba odmietnutá.  Zdrojová IP má zlú reputáciu."
fix  = "Odošlite z inej IP alebo požiadajte o delisting."

[diagnostics.smtp.esc.5_7_750]
what = "Klient blokovaný pre odosielanie z neregistrovaných domén."
fix  = "Overte doménu odosielateľa v tenante alebo použite akceptovanú doménu."

[diagnostics.smtp.esc.5_1_0]
what = "Adresa odosielateľa odmietnutá."
fix  = "From/MAIL FROM neakceptované; zvyčajne formát alebo politika domény."

[diagnostics.smtp.esc.5_1_1]
what = "Zlá cieľová schránka - príjemca neexistuje."
fix  = "Skontrolujte adresu príjemcu."

[diagnostics.smtp.esc.5_1_7]
what = "Neplatná adresa odosielateľa (zdeformovaná)."
fix  = "Opravte syntax MAIL FROM."

[diagnostics.smtp.esc.5_1_8]
what = "Doména odosielateľa nie je povolená."
fix  = "Doména serverom neakceptovaná."

[diagnostics.smtp.esc.5_1_10]
what = "Adresa príjemcu odmietnutá - používateľ neznámy."
fix  = "Preklep alebo neexistujúci príjemca."

[diagnostics.smtp.esc.5_4_1]
what = "Adresa príjemcu odmietnutá: prístup zamietnutý."
fix  = "Schránka príjemcu odmieta správy od tohto odosielateľa / domény."

[diagnostics.smtp.esc.5_2_1]
what = "Schránka zakázaná, neprijíma správy."
fix  = "Schránka príjemcu pozastavená."

[diagnostics.smtp.esc.5_2_2]
what = "Schránka plná."
fix  = "Kvóta príjemcu prekročená."

[diagnostics.smtp.esc.5_3_4]
what = "Správa je príliš veľká pre systém."
fix  = "Zmenšite veľkosť správy."

[diagnostics.smtp.esc.4_7_0]
what = "Dočasné zlyhanie overenia / throttling."
fix  = "Skúste znova neskôr; môže to byť aj tarpit pre opakované chybné logins."

[diagnostics.smtp.esc.4_4_2]
what = "Spojenie prerušené."
