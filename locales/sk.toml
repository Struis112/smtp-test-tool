[diagnostics.imap.AUTHENTICATIONFAILED]
hint = "IMAP login odmietnutý - zlé heslo, MFA bez app-password, alebo Basic Auth zakázaný."

[diagnostics.imap."LOGIN_failed"]
hint = "IMAP login odmietnutý serverom."

[diagnostics.imap.ALERT]
hint = "Server vrátil ALERT odpoveď - prečítajte si ju; správa definovaná administrátorom."

[diagnostics.imap.UNAVAILABLE]
hint = "Schránka/server dočasne nedostupné."

[diagnostics.imap.PRIVACYREQUIRED]
hint = "Server vyžaduje TLS pred LOGIN - použite STARTTLS alebo implicitné SSL."

[diagnostics.imap.CLIENTBUG]
hint = "Klient urobil niečo, čo server považuje za zlé; zvyčajne chýba STARTTLS alebo zlý stav."

[diagnostics.imap.LOGINDISABLED]
hint = "Plain LOGIN je na tomto serveri zakázaný - použite STARTTLS/SSL alebo XOAUTH2."

[diagnostics.pop.authentication_failed]
hint = "POP3 login odmietnutý - zlé údaje alebo POP zakázaný pre túto schránku."

[diagnostics.pop.logon_failure]
hint = "POP3 login odmietnutý."

[diagnostics.pop.not_implemented]
hint = "Server nepodporuje vydaný príkaz."

[diagnostics.pop.disabled]
hint = "POP3 prístup je zakázaný pre tento účet / tenant."

[diagnostics.bounce.gmail_send_as_en]
needle = "Send mail as"
hint = "Upstream login 'Send mail as' Gmailu zlyhal.  Nastavenia > Zobraziť všetky nastavenia > Účty a import > Posielať ako > Upraviť informácie > znova zadajte SMTP heslo (alebo app-password, ak zdrojový účet má 2FA)."

[diagnostics.bounce.gmail_send_as_nl]
needle = "Mail sturen als"
hint = "Upstream login 'Mail sturen als' (Send mail as) Gmailu zlyhal.  Nastavenia > Zobraziť všetky nastavenia > Účty a import > Posielať ako > Upraviť informácie > znova zadajte SMTP heslo (alebo app-password, ak zdrojový účet má 2FA)."

