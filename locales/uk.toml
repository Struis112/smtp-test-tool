[diagnostics.smtp.esc.5_7_0]
what = "Потрібна автентифікація або обраний AUTH механізм не дозволений."
fix  = "Увімкніть SMTP AUTH для поштової скриньки; перевірте, що LOGIN / PLAIN / XOAUTH2 дозволений."

[diagnostics.smtp.esc.5_7_1]
what = "Доступ relay відмовлено - сервер відмовляється переслати це повідомлення."
fix  = "Або відправник не автентифікований, отримувач зовнішній і relay вимкнено, або transport rule блокує повідомлення."

[diagnostics.smtp.esc.5_7_3]
what = "Автентифікація неуспішна."
fix  = "Невірний пароль, MFA увімкнено без app-password, або Basic/Legacy auth вимкнено на tenant (O365: 'SMTP AUTH disabled')."

[diagnostics.smtp.esc.5_7_8]
what = "Облікові дані автентифікації недійсні."
fix  = "Ім'я користувача/пароль відхилено шаром SASL."

[diagnostics.smtp.esc.5_7_57]
what = "Клієнт не був автентифікований для надсилання анонімної пошти під час MAIL FROM."
fix  = "Примусово встановіть STARTTLS + AUTH перед MAIL FROM.  У O365 це типова помилка, коли клієнт підключається без AUTH."

[diagnostics.smtp.esc.5_7_60]
what = "SendAsDenied - автентифікований користувач не може надсилати ЯК ця адреса From."
fix  = "Надайте поштовій скриньці права 'Send As' (або 'Send on Behalf') для автентифікованого облікового запису або змініть заголовок From, щоб відповідав логіну."

[diagnostics.smtp.esc.5_7_64]
what = "TenantAttribution; Relay Access Denied."
fix  = "Автентифікована SMTP-відправка вимагає ліцензовану поштову скриньку в O365."

[diagnostics.smtp.esc.5_7_124]
