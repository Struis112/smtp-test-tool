[diagnostics.smtp.esc.5_7_0]
what = "প্রমাণীকরণ প্রয়োজন, অথবা নির্বাচিত AUTH পদ্ধতির অনুমতি নেই।"
fix  = "মেইলবক্সের জন্য SMTP AUTH সক্ষম করুন; যাচাই করুন LOGIN / PLAIN / XOAUTH2 অনুমোদিত।"

[diagnostics.smtp.esc.5_7_1]
what = "Relay অ্যাক্সেস অস্বীকৃত - সার্ভার এই বার্তা ফরওয়ার্ড করতে অস্বীকার করে।"
fix  = "হয় প্রেরক প্রমাণিত নয়, অথবা প্রাপক বাহ্যিক এবং relay নিষ্ক্রিয়, অথবা একটি transport rule বার্তাটি ব্লক করছে।"

[diagnostics.smtp.esc.5_7_3]
what = "প্রমাণীকরণ ব্যর্থ।"
fix  = "ভুল পাসওয়ার্ড, app-password ছাড়া MFA, অথবা tenant-এ Basic/Legacy auth অক্ষম (O365: 'SMTP AUTH disabled')।"

[diagnostics.smtp.esc.5_7_8]
what = "প্রমাণীকরণ শংসাপত্র বৈধ নয়।"
fix  = "SASL স্তর দ্বারা ব্যবহারকারী নাম/পাসওয়ার্ড প্রত্যাখ্যান।"

[diagnostics.smtp.esc.5_7_57]
what = "MAIL FROM চলাকালীন বেনামী মেইল পাঠানোর জন্য ক্লায়েন্ট প্রমাণিত ছিল না।"
fix  = "MAIL FROM-এর আগে STARTTLS + AUTH জোর করুন। O365-এ, এটি AUTH ছাড়া ক্লায়েন্ট সংযোগের সাধারণ ত্রুটি।"

[diagnostics.smtp.esc.5_7_60]
what = "SendAsDenied - প্রমাণিত ব্যবহারকারীকে এই From ঠিকানা হিসাবে পাঠানোর অনুমতি নেই।"
fix  = "প্রমাণিত অ্যাকাউন্টে মেইলবক্সের 'Send As' (বা 'Send on Behalf') অধিকার দিন, অথবা লগইনের সাথে মেলে From হেডার পরিবর্তন করুন।"

[diagnostics.smtp.esc.5_7_64]
what = "TenantAttribution; Relay Access Denied।"
fix  = "প্রমাণিত SMTP জমা দেওয়ার জন্য O365-এ লাইসেন্সযুক্ত মেইলবক্স প্রয়োজন।"

[diagnostics.smtp.esc.5_7_124]
