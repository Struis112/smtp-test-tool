[diagnostics.imap.AUTHENTICATIONFAILED]
hint = "IMAP লগইন প্রত্যাখ্যাত - ভুল পাসওয়ার্ড, app-password ছাড়া MFA, বা Basic Auth নিষ্ক্রিয়।"

[diagnostics.imap."LOGIN_failed"]
hint = "IMAP লগইন সার্ভার দ্বারা প্রত্যাখ্যাত।"

[diagnostics.imap.ALERT]
hint = "সার্ভার একটি ALERT প্রতিক্রিয়া ফেরত দিয়েছে - পড়ুন; প্রশাসক-নির্ধারিত বার্তা।"

[diagnostics.imap.UNAVAILABLE]
hint = "মেইলবক্স/সার্ভার অস্থায়ীভাবে অনুপলব্ধ।"

[diagnostics.imap.PRIVACYREQUIRED]
hint = "সার্ভারের LOGIN-এর আগে TLS প্রয়োজন - STARTTLS বা অন্তর্নিহিত SSL ব্যবহার করুন।"

[diagnostics.imap.CLIENTBUG]
hint = "ক্লায়েন্ট এমন কিছু করেছে যা সার্ভার ভুল মনে করে; সাধারণত STARTTLS অনুপস্থিত বা ভুল অবস্থা।"

[diagnostics.imap.LOGINDISABLED]
