fix  = "নিষ্ক্রিয় মেইলবক্স, Conditional Access দ্বারা ব্লক, অথবা লাইসেন্স অনুপস্থিত।"

[diagnostics.smtp.esc.5_7_135]
what = "প্রমাণীকরণ ব্যর্থ, ব্যবহারকারীর শংসাপত্র মেয়াদোত্তীর্ণ।"
fix  = "পাসওয়ার্ড রিসেট করুন / OAuth টোকেন রিফ্রেশ করুন।"

[diagnostics.smtp.esc.5_7_139]
