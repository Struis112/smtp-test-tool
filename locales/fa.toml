[ui.diagnose]
intro = "متن پیام شکست تحویل را برای استخراج راهنمایی‌های قابل اجرا برای IT در زیر بچسبانید. SMTP enhanced status codes (5.7.139، 5.7.60)، عبارات Microsoft 365 (\"basic authentication is disabled\") و برگشت‌های سمت وب‌میل مانند \"Send mail as / Mail sturen als\" Gmail را تشخیص می‌دهد. چیزی از طریق شبکه ارسال نمی‌شود و متن روی دیسک ذخیره نمی‌شود."
input_placeholder = "متن برگشت را اینجا بچسبانید..."
analyse = "تحلیل"
clear = "پاک کردن"
hints_heading = "راهنمایی‌ها"
no_hints_yet = "(هنوز راهنمایی نیست - یک برگشت در بالا بچسبانید و روی تحلیل کلیک کنید)"

[ui.log]
heading = "ثبت"

[diagnostics.scaffold]
esc_prefix = "ESC {code}: {what}"
action_prefix = "  -> اقدام: {fix}"
hint_prefix = "  -> {hint}"

[diagnostics.smtp.esc.5_7_0]
what = "احراز هویت لازم است، یا مکانیزم AUTH انتخاب‌شده مجاز نیست."
fix  = "SMTP AUTH را برای صندوق پستی فعال کنید؛ تأیید کنید که LOGIN / PLAIN / XOAUTH2 مجاز است."

[diagnostics.smtp.esc.5_7_1]
what = "دسترسی Relay رد شد - سرور از ارسال این پیام خودداری می‌کند."
fix  = "یا فرستنده احراز هویت نشده، یا گیرنده خارجی است و relay غیرفعال است، یا یک transport rule پیام را مسدود می‌کند."

[diagnostics.smtp.esc.5_7_3]
what = "احراز هویت موفقیت‌آمیز نبود."
fix  = "گذرواژه اشتباه، MFA بدون app-password، یا Basic/Legacy auth در tenant غیرفعال است (O365: 'SMTP AUTH disabled')."

[diagnostics.smtp.esc.5_7_8]
what = "اعتبارنامه‌های احراز هویت معتبر نیست."
fix  = "نام کاربری/گذرواژه توسط لایه SASL رد شد."

[diagnostics.smtp.esc.5_7_57]
what = "مشتری در طول MAIL FROM برای ارسال ایمیل ناشناس احراز هویت نشده بود."
fix  = "STARTTLS + AUTH را قبل از MAIL FROM اجباری کنید. در O365، این خطای معمول هنگامی است که مشتری بدون AUTH متصل می‌شود."

[diagnostics.smtp.esc.5_7_60]
what = "SendAsDenied - کاربر احراز هویت‌شده اجازه ارسال به عنوان این آدرس From را ندارد."
fix  = "حق 'Send As' (یا 'Send on Behalf') صندوق پستی را به حساب احراز هویت‌شده اعطا کنید، یا سرآیند From را برای مطابقت با ورود تغییر دهید."

[diagnostics.smtp.esc.5_7_64]
what = "TenantAttribution; Relay Access Denied."
fix  = "ارسال SMTP احراز هویت‌شده به صندوق پستی دارای مجوز در O365 نیاز دارد."

[diagnostics.smtp.esc.5_7_124]
what = "کاربر مجاز به ارسال ایمیل نیست."
fix  = "صندوق پستی غیرفعال، توسط Conditional Access مسدود شده، یا مجوز موجود نیست."

[diagnostics.smtp.esc.5_7_135]
what = "احراز هویت موفقیت‌آمیز نبود، اعتبارنامه‌های کاربر منقضی شده‌اند."
fix  = "گذرواژه را بازنشانی کنید / توکن OAuth را تازه کنید."

[diagnostics.smtp.esc.5_7_139]
what = "احراز هویت موفقیت‌آمیز نبود؛ درخواست معیارها را برآورده نکرد."
fix  = "خط‌مشی Conditional Access ورود را رد کرد (مکان، دستگاه، MFA)."

[diagnostics.smtp.esc.5_7_500]
what = "دسترسی رد شد، دامنه ارسال غیرفعال است."
fix  = "دامنه فرستنده برای ایمیل خروجی در این tenant مسدود شده است."

[diagnostics.smtp.esc.5_7_501]
what = "دسترسی رد شد، فرستنده ممنوع."
fix  = "آدرس فرستنده در blocklist تنانت است."

[diagnostics.smtp.esc.5_7_508]
what = "دسترسی رد شد، آستانه نرخ یا ترافیک تجاوز کرد."
fix  = "Throttled؛ صبر کنید و دوباره امتحان کنید، یا از مدیر بخواهید محدودیت را افزایش دهد."

[diagnostics.smtp.esc.5_7_511]
what = "دسترسی رد شد، فرستنده ممنوع."
fix  = "فرستنده به عنوان منبع هرزنامه علامت‌گذاری شده است."

[diagnostics.smtp.esc.5_7_606]
what = "دسترسی رد شد، IP ارسال ممنوع."
fix  = "IP ارسال در blocklist مایکروسافت است."

[diagnostics.smtp.esc.5_7_708]
what = "سرویس رد شد. IP منبع شهرت بدی دارد."
fix  = "از IP دیگری ارسال کنید یا درخواست delisting کنید."

[diagnostics.smtp.esc.5_7_750]
what = "مشتری از ارسال از دامنه‌های ثبت‌نشده مسدود شد."
fix  = "دامنه فرستنده را در tenant تأیید کنید یا از دامنه پذیرفته‌شده استفاده کنید."

[diagnostics.smtp.esc.5_1_0]
what = "آدرس فرستنده رد شد."
fix  = "From/MAIL FROM پذیرفته نشد؛ معمولاً مشکل قالب یا خط‌مشی دامنه."

[diagnostics.smtp.esc.5_1_1]
