[diagnostics.imap.AUTHENTICATIONFAILED]
hint = "ورود IMAP رد شد - گذرواژه اشتباه، MFA بدون app-password، یا Basic Auth غیرفعال."

[diagnostics.imap."LOGIN_failed"]
hint = "ورود IMAP توسط سرور رد شد."

[diagnostics.imap.ALERT]
hint = "سرور یک پاسخ ALERT برگرداند - بخوانید؛ پیام تعریف‌شده توسط مدیر."

[diagnostics.imap.UNAVAILABLE]
hint = "صندوق پستی/سرور موقتاً در دسترس نیست."

[diagnostics.imap.PRIVACYREQUIRED]
