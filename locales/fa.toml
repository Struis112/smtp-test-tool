[diagnostics.pop.authentication_failed]
hint = "ورود POP3 رد شد - اعتبارنامه‌های اشتباه یا POP برای این صندوق پستی غیرفعال است."

[diagnostics.pop.logon_failure]
hint = "ورود POP3 رد شد."

[diagnostics.pop.not_implemented]
