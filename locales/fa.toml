[diagnostics.pop.disabled]
hint = "دسترسی POP3 برای این حساب / tenant غیرفعال است."

[diagnostics.bounce.gmail_send_as_en]
needle = "Send mail as"
hint = "ورود upstream 'Send mail as' Gmail ناموفق بود. تنظیمات > مشاهده همه تنظیمات > حساب‌ها و وارد کردن > ارسال ایمیل به عنوان > ویرایش اطلاعات > گذرواژه SMTP را دوباره وارد کنید (یا app-password اگر حساب منبع 2FA دارد)."

[diagnostics.bounce.gmail_send_as_nl]
needle = "Mail sturen als"
hint = "ورود upstream 'Mail sturen als' (Send mail as) Gmail ناموفق بود. تنظیمات > مشاهده همه تنظیمات > حساب‌ها و وارد کردن > ارسال ایمیل به عنوان > ویرایش اطلاعات > گذرواژه SMTP را دوباره وارد کنید (یا app-password اگر حساب منبع 2FA دارد)."

