# smtp-test-tool locale: فارسی (fa)
# status: machine-translated, native review welcome.
# Note: Persian uses the Arabic script; egui 0.34's bidi support is
# partial - glyph shape correct, paragraph layout best-effort.

[app]
name = "SMTP Test Tool"

[locale]
native_name = "فارسی"
english_name = "Persian"
status_note = "ترجمه ماشینی - بازبینی توسط گویشور بومی استقبال می‌شود."

[ui.window]
