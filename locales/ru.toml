heading = "Лог"

[diagnostics.scaffold]
esc_prefix = "ESC {code}: {what}"
action_prefix = "  -> Действие: {fix}"
hint_prefix = "  -> {hint}"

[diagnostics.smtp.esc.5_7_0]
what = "Требуется аутентификация или выбранный механизм AUTH не разрешён."
fix  = "Включите SMTP AUTH для почтового ящика; проверьте, что LOGIN / PLAIN / XOAUTH2 разрешён."

[diagnostics.smtp.esc.5_7_1]
what = "Доступ relay отклонён - сервер отказывается пересылать это сообщение."
fix  = "Либо отправитель не аутентифицирован, получатель внешний и relay отключён, либо transport rule блокирует сообщение."

[diagnostics.smtp.esc.5_7_3]
what = "Аутентификация неуспешна."
fix  = "Неверный пароль, MFA включён без app-password, или Basic/Legacy auth отключён на tenant (O365: 'SMTP AUTH disabled')."

[diagnostics.smtp.esc.5_7_8]
what = "Учётные данные аутентификации недействительны."
fix  = "Имя пользователя/пароль отклонены SASL-слоем."

[diagnostics.smtp.esc.5_7_57]
what = "Клиент не был аутентифицирован для отправки анонимной почты во время MAIL FROM."
fix  = "Принудительно установите STARTTLS + AUTH перед MAIL FROM.  В O365 это типичная ошибка, когда клиент подключается без AUTH."

[diagnostics.smtp.esc.5_7_60]
what = "SendAsDenied - аутентифицированный пользователь не может отправлять КАК этот адрес From."
fix  = "Предоставьте почтовому ящику права 'Send As' (или 'Send on Behalf') для аутентифицированной учётной записи или измените заголовок From, чтобы он соответствовал логину."

[diagnostics.smtp.esc.5_7_64]
