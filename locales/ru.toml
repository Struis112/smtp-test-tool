[diagnostics.smtp.esc.5_7_124]
what = "Пользователь не уполномочен отправлять почту."
fix  = "Отключённый почтовый ящик, заблокирован Conditional Access, или отсутствует лицензия."

[diagnostics.smtp.esc.5_7_135]
what = "Аутентификация неуспешна, учётные данные пользователя истекли."
fix  = "Сбросьте пароль / обновите OAuth токен."

[diagnostics.smtp.esc.5_7_139]
what = "Аутентификация неуспешна; запрос не соответствует критериям."
