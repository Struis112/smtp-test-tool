# smtp-test-tool locale: Nederlands (nl)
#
# Native-translated.  Technical terms (SMTP AUTH, App Password,
# Conditional Access, STARTTLS, XOAUTH2, MAIL FROM, ...) are kept in
# English on purpose: that's how they appear in Microsoft 365 admin
# panels and provider docs, and switching them to half-Dutch
# half-English would confuse an IT person more than help.

[app]
name = "SMTP Test Tool"

[locale]
native_name = "Nederlands"
english_name = "Dutch"
# Empty: native-reviewed by the maintainer.  Other locale files set
# this to the machine-translated banner so users know to take strings
# with a grain of salt.
status_note = ""

# (test.fixture.greeting intentionally omitted - exercises the
# missing-key-falls-back-to-base path in the i18n unit tests.)

